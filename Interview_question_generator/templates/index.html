<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Question Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            margin-bottom: 20px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e9ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 10px;
        }

        .file-info {
            margin-top: 15px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #2e7d32;
        }

        input[type="file"] {
            display: none;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .results-body {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 0 0 10px 10px;
        }

        .question-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .question-number {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .question-text {
            color: #333;
            line-height: 1.6;
            font-size: 1rem;
        }

        .answer-text {
            color: #555;
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 0.95rem;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid #c62828;
        }

        .error-message.show {
            display: block;
        }

        .download-btn {
            margin-top: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 30px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .main-card {
                padding: 25px;
            }

            .upload-area {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Interview Question Generator</h1>
            <p>Upload your document and generate AI-powered interview questions</p>
        </header>

        <div class="main-card">
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">PDF</div>
                        <div class="upload-text">
                            <strong>Drag & Drop your PDF file here</strong><br>
                            or click to browse
                        </div>
                        <input type="file" id="fileInput" name="file" accept=".pdf" required>
                    </div>
                    <div class="file-info" id="fileInfo">
                        <span class="file-name" id="fileName"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="numQuestions">Number of Questions</label>
                    <input type="number" id="numQuestions" name="num_questions" 
                           min="1" max="50" value="10" required>
                </div>

                <div class="form-group">
                    <label for="difficulty">Difficulty Level</label>
                    <select id="difficulty" name="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="mixed">Mixed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="topic">Topic/Subject (Optional)</label>
                    <input type="text" id="topic" name="topic" 
                           placeholder="e.g., Python Programming, Data Structures">
                </div>

                <button type="submit" class="btn btn-primary" id="generateBtn">
                    Generate Questions
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating questions... Please wait</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="results" id="results">
                <div class="results-header">
                    Generated Interview Questions
                </div>
                <div class="results-body" id="resultsBody">
                    
                </div>
                <button class="download-btn" id="downloadBtn">
                    Download Questions as JSON
                </button>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Interview Question Generator | Powered by AI</p>
        </footer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const resultsBody = document.getElementById('resultsBody');
        const errorMessage = document.getElementById('errorMessage');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let generatedQuestions = [];

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File selection
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // Drag and drop functionality
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                fileInput.files = e.dataTransfer.files;
                handleFile(file);
            } else {
                showError('Please upload a PDF file');
            }
        });

        function handleFile(file) {
            if (file) {
                fileName.textContent = `Selected: ${file.name} (${formatFileSize(file.size)})`;
                fileInfo.classList.add('show');
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!fileInput.files[0]) {
                showError('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('pdf_file', fileInput.files[0]);
            formData.append('filename', fileInput.files[0].name);

            // Show loading, hide results and errors
            loading.classList.add('show');
            results.classList.remove('show');
            errorMessage.classList.remove('show');
            generateBtn.disabled = true;

            try {
                // Step 1: Upload the file
                const uploadResponse = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResponse.ok) {
                    throw new Error('Failed to upload file');
                }

                const uploadData = await uploadResponse.json();
                
                // Step 2: Generate questions
                const generateFormData = new FormData();
                generateFormData.append('file_path', uploadData.file_path);
                generateFormData.append('num_questions', document.getElementById('numQuestions').value);
                
                const generateResponse = await fetch('/generate', {
                    method: 'POST',
                    body: generateFormData
                });

                if (!generateResponse.ok) {
                    throw new Error('Failed to generate questions');
                }

                const generateData = await generateResponse.json();
                
                if (generateData.error) {
                    throw new Error(generateData.error);
                }
                
                generatedQuestions = generateData.questions || [];
                displayResults(generatedQuestions);
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                loading.classList.remove('show');
                generateBtn.disabled = false;
            }
        });

        function displayResults(questions) {
            resultsBody.innerHTML = '';
            
            if (Array.isArray(questions)) {
                questions.forEach((item, index) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question-item';
                    
                    let questionHTML = `
                        <div class="question-number">Question ${index + 1}</div>
                        <div class="question-text">${item.question || item}</div>
                    `;
                    
                    if (item.answer) {
                        questionHTML += `
                            <div class="answer-text">
                                <strong>Answer:</strong> ${item.answer}
                            </div>
                        `;
                    }
                    
                    questionDiv.innerHTML = questionHTML;
                    resultsBody.appendChild(questionDiv);
                });
            } else if (typeof questions === 'object') {
                // Handle object format
                Object.keys(questions).forEach((key, index) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question-item';
                    questionDiv.innerHTML = `
                        <div class="question-number">Question ${index + 1}</div>
                        <div class="question-text">${questions[key]}</div>
                    `;
                    resultsBody.appendChild(questionDiv);
                });
            }
            
            results.classList.add('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Download functionality
        downloadBtn.addEventListener('click', () => {
            const dataStr = JSON.stringify(generatedQuestions, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'interview_questions.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
