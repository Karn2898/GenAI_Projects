name: Deploy App docker Image to EC2 instance

on:
  push:
    branches: [main]

jobs:
  Continuous-Integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Validate ECR repository name
      env:
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      run: |
        if [ -z "$ECR_REPOSITORY" ]; then
          echo "ECR_REPOSITORY secret is empty or missing."
          echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret"
          echo "Example value: medical-chatbot"
          exit 1
        fi

    - name: Create ECR repository if it does not exist
      env:
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      run: |
        aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_DEFAULT_REGION" \
          || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_DEFAULT_REGION"

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: latest
      run: |
        docker build -f Medical_chatbot/dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG Medical_chatbot
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  Continuous-Deployment:
    needs: Continuous-Integration
    runs-on: ubuntu-latest
    permissions: {}

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Validate EC2 connection secrets
      id: validate-ec2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      run: |
        missing=()
        [ -z "$EC2_HOST" ]     && missing+=("EC2_HOST")
        [ -z "$EC2_USERNAME" ] && missing+=("EC2_USERNAME")
        [ -z "$EC2_SSH_KEY" ]  && missing+=("EC2_SSH_KEY")
        if [ ${#missing[@]} -gt 0 ]; then
          echo "::warning::The following required secrets are missing: ${missing[*]}"
          echo "Set them in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret"
          echo "  EC2_HOST      - Public IP or hostname of your EC2 instance"
          echo "  EC2_USERNAME  - SSH login user (e.g. ubuntu, ec2-user)"
          echo "  EC2_SSH_KEY   - Private SSH key used to connect to the instance"
          echo "Skipping deployment."
          echo "ec2_ready=false" >> "$GITHUB_OUTPUT"
        else
          echo "ec2_ready=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Deploy Docker Image to EC2
      if: steps.validate-ec2.outputs.ec2_ready == 'true'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          docker stop medicalbot || true
          docker rm medicalbot || true
          docker run -d --name medicalbot \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -p 8080:8080 \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
